<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Autor</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:40px;
        }

        nav{
            margin-bottom:20px;
        }

        nav a{
            margin-right:15px;
            text-decoration:none;
            font-weight:bold;
        }

        label{
            display:block;
            margin-top:10px;
            font-weight:bold;
        }

        input{
            padding:6px;
            width:300px;
            margin-top:4px;
        }

        button{
            margin-top:20px;
            padding:8px 16px;
        }
    </style>
</head>
<body>

<nav>
    <a href="/autores">Autores</a>
    <a href="/livros">Livros</a>
</nav>

<h1>Cadastro de Autor</h1>

<form th:action="${autor.id == null} ?
                 @{/autores} :
                 @{/autores/{id}(id=${autor.id})}"
      th:object="${autor}"
      method="post">

    <label>Nome</label>
    <br>

    <input type="text"
           th:field="*{nome}">
    <br><br>

    <label>Nacionalidade</label>
    <br>

    <input type="text"
           th:field="*{nacionalidade}">
    <br><br>

    <label>Ano Nascimento</label>
    <br>

    <input type="number"
           th:field="*{anoNascimento}">
    <br><br>

    <button type="submit">
        Salvar
    </button>

</form>

<br>

<a href="/autores">
    Voltar
</a>

</body>
</html>
