<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Autores</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:40px;
        }

        nav{
            margin-bottom:20px;
        }

        nav a{
            margin-right:15px;
            text-decoration:none;
            font-weight:bold;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th,td{
            border:1px solid #ccc;
            padding:8px;
        }

        .sucesso{
            background:#d4edda;
            padding:10px;
            margin-bottom:15px;
        }
    </style>
</head>
<body>

<nav>
    <a href="/autores">Autores</a>
    <a href="/livros">Livros</a>
</nav>

<div th:if="${sucesso}" class="sucesso">
    <span th:text="${sucesso}"></span>
</div>

<h1>Autores</h1>

<a href="/autores/novo">Novo Autor</a>

<br><br>

<table>

    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Nacionalidade</th>
        <th>Ano Nascimento</th>
        <th>Ações</th>
    </tr>

    <tr th:each="autor : ${autores}">

        <td th:text="${autor.id}"></td>

        <td th:text="${autor.nome}"></td>

        <td th:text="${autor.nacionalidade}"></td>

        <td th:text="${autor.anoNascimento}"></td>

        <td>

            <a th:href="@{/autores/{id}/editar(id=${autor.id})}">
                Editar
            </a>

            <form th:action="@{/autores/{id}/excluir(id=${autor.id})}"
                  method="post"
                  style="display:inline;">

                <button type="submit">
                    Excluir
                </button>

            </form>

        </td>

    </tr>

</table>

</body>
</html>
