<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Autores</title>
</head>
<body>

<h1>Autores</h1>

<a href="/autores/novo">Novo Autor</a>

<br><br>

<table>

    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Nacionalidade</th>
        <th>Ano Nascimento</th>
        <th>Ações</th>
    </tr>

    <tr th:each="autor : ${autores}">

        <td th:text="${autor.id}"></td>

        <td th:text="${autor.nome}"></td>

        <td th:text="${autor.nacionalidade}"></td>

        <td th:text="${autor.anoNascimento}"></td>

        <td>

            <a th:href="@{/autores/{id}/editar(id=${autor.id})}">
                Editar
            </a>

            <form th:action="@{/autores/{id}/excluir(id=${autor.id})}"
                  method="post"
                  style="display:inline;">

                <button type="submit">
                    Excluir
                </button>

            </form>

        </td>

    </tr>

</table>

</body>
</html>
