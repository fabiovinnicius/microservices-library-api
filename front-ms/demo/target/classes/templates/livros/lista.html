<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Livros</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:40px;
        }

        nav{
            margin-bottom:20px;
        }

        nav a{
            margin-right:15px;
            text-decoration:none;
            font-weight:bold;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th,td{
            border:1px solid #ccc;
            padding:8px;
        }

        .sucesso{
            background:#d4edda;
            padding:10px;
            margin-bottom:15px;
        }

        .erro{
            background:#f8d7da;
            padding:10px;
            margin-bottom:15px;
        }

        .badge-sim{
            background:#28a745;
            color:#fff;
            padding:3px 8px;
            border-radius:4px;
        }

        .badge-nao{
            background:#dc3545;
            color:#fff;
            padding:3px 8px;
            border-radius:4px;
        }
    </style>
</head>
<body>

<nav>
    <a href="/autores">Autores</a>
    <a href="/livros">Livros</a>
</nav>

<div th:if="${sucesso}" class="sucesso">
    <span th:text="${sucesso}"></span>
</div>

<div th:if="${erro}" class="erro">
    <span th:text="${erro}"></span>
</div>

<h1>Livros</h1>

<a href="/livros/novo">Novo Livro</a>

<br><br>

<form method="get" th:action="@{/livros}">
    <label>Filtrar por disponibilidade:</label>
    <select name="disponivel" onchange="this.form.submit()">
        <option value="">Todos</option>
        <option value="true">Disponíveis</option>
        <option value="false">Indisponíveis</option>
    </select>
</form>

<br>

<table>

    <tr>
        <th>Título</th>
        <th>Gênero</th>
        <th>Ano</th>
        <th>Disponível</th>
        <th>Autor</th>
        <th>Ações</th>
    </tr>

    <tr th:each="livro : ${livros}">

        <td>
            <a th:href="@{/livros/{id}(id=${livro.id})}" th:text="${livro.titulo}"></a>
        </td>

        <td th:text="${livro.genero}"></td>

        <td th:text="${livro.anoPublicacao}"></td>

        <td>
            <span th:if="${livro.disponivel}" class="badge-sim">Sim</span>
            <span th:unless="${livro.disponivel}" class="badge-nao">Não</span>
        </td>

        <td th:text="${livro.nomeAutor}"></td>

        <td>

            <a th:href="@{/livros/{id}/editar(id=${livro.id})}">
                Editar
            </a>

            <form th:action="@{/livros/{id}/excluir(id=${livro.id})}"
                  method="post"
                  style="display:inline;"
                  th:attr="onsubmit='return confirm(\'Excluir o livro ' + ${livro.titulo} + '?\');'">

                <button type="submit">
                    Excluir
                </button>

            </form>

        </td>

    </tr>

</table>

</body>
</html>
